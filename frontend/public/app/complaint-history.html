<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Complaint History - Smart Complaint System</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><i class="fa-solid fa-city"></i> Smart City</div>
    <div class="side-label">Main</div>
    <a href="user-dashboard.html"><i class="fa-solid fa-gauge"></i> Dashboard</a>
    <a href="register-complaint.html"><i class="fa-solid fa-plus-circle"></i> Register Complaint</a>
    <a href="complaint-history.html" class="active"><i class="fa-solid fa-clock-rotate-left"></i> My Complaints</a>
    <div class="side-label">Account</div>
    <a href="#"><i class="fa-solid fa-user"></i> Profile</a>
    <a href="#" data-logout><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
  </aside>
  <div class="main">
    <div class="topbar">
      <button class="hamburger"><i class="fa-solid fa-bars"></i></button>
      <div class="search"><i class="fa-solid fa-magnifying-glass"></i><input id="searchInput" type="text" placeholder="Search by title, ID, category..." /></div>
      <div class="top-actions">
        <button class="icon-btn"><i class="fa-regular fa-bell"></i></button>
        <div class="avatar">U</div>
      </div>
    </div>
    <div class="content">
      <div class="page-head">
        <div>
          <h1>Complaint History</h1>
          <p>All complaints you have registered so far.</p>
        </div>
        <a href="register-complaint.html" class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Complaint</a>
      </div>

      <div class="card">
        <div class="card-head">
          <h3>All Complaints</h3>
          <div style="display:flex;gap:8px;">
            <select id="statusFilter" style="padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-family:inherit;">
              <option value="">All Status</option><option>Open</option><option>In Progress</option><option>Resolved</option>
            </select>
            <select id="catFilter" style="padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-family:inherit;">
              <option value="">All Categories</option>
            </select>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>ID</th><th>Title</th><th>Category</th><th>Location</th><th>Date</th><th>Status</th><th></th></tr>
            </thead>
            <tbody id="tbl"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="js/main.js"></script>
<script>
const catFilter = document.getElementById('catFilter');
catFilter.innerHTML += CATEGORIES.map(c => `<option>${c.key}</option>`).join('');

function render() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const s = document.getElementById('statusFilter').value;
  const c = catFilter.value;
  const list = loadComplaints().filter(x =>
    (!s || x.status === s) &&
    (!c || x.category === c) &&
    (!q || x.title.toLowerCase().includes(q) || x.id.toLowerCase().includes(q) || x.category.toLowerCase().includes(q))
  );
  const tbl = document.getElementById('tbl');
  if (!list.length) {
    tbl.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--muted);">No complaints found</td></tr>`;
    return;
  }
  tbl.innerHTML = list.map(x => `
    <tr>
      <td><span class="cid">${x.id}</span></td>
      <td>${x.title}</td>
      <td>${catBadge(x.category)}</td>
      <td>${x.location}</td>
      <td>${formatDate(x.date)}</td>
      <td>${statusBadge(x.status)}</td>
      <td><a href="complaint-details.html?id=${x.id}" class="btn btn-outline btn-sm"><i class="fa-solid fa-eye"></i> View</a></td>
    </tr>`).join('');
}
['searchInput','statusFilter','catFilter'].forEach(id => document.getElementById(id).addEventListener('input', render));
render();
</script>
</body>
</html>
